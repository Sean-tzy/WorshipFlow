services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: worshipflow
      MYSQL_USER: worshipflow
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
